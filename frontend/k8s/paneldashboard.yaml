apiVersion: apps/v1
kind: Deployment
metadata:
  name: paneldashboard
  namespace: sufra
  labels:
    app: paneldashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paneldashboard
  template:
    metadata:
      labels:
        app: paneldashboard
    spec:
      containers:
        - name: paneldashboard
          image: 220719767281.dkr.ecr.us-east-1.amazonaws.com/sufra/paneldashboard:v1
          ports:
            - containerPort: 3008
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: paneldashboard
  namespace: sufra
spec:
  type: ClusterIP
  selector:
    app: paneldashboard
  ports:
    - port: 80
      targetPort: 3008
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paneldashboard
  namespace: sufra
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: paneldashboard
                port:
                  number: 80
