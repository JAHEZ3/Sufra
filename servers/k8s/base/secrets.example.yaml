# EXAMPLE ONLY — do NOT commit real secrets.
# In production use Sealed Secrets, External Secrets Operator, or AWS SSM/Secrets
# Manager (via the External Secrets Operator) instead of a plain Secret.
# Apply once manually:  kubectl apply -f secrets.example.yaml  (after filling in)
apiVersion: v1
kind: Secret
metadata:
  name: sufra-secrets
  namespace: sufra
type: Opaque
stringData:
  DB_USER: "postgres"
  DB_PASSWORD: "CHANGE_ME"
  JWT_ACCESS_SECRET: "CHANGE_ME"
  JWT_REFRESH_SECRET: "CHANGE_ME"
  # AWS S3 (logo/cover/meal images)
  AWS_REGION: "eu-central-1"
  AWS_S3_BUCKET: "CHANGE_ME"
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  # AI providers
  OPENAI_API_KEY: "CHANGE_ME"
  ELEVENLABS_API_KEY: "CHANGE_ME"
