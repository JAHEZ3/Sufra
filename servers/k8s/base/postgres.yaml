# In-cluster Postgres for dev/staging. For production prefer AWS RDS and drop
# this file from kustomization.yaml (point DB_HOST at the RDS endpoint instead).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sufra
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - { containerPort: 5432 }
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: sufra-secrets, key: DB_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: sufra-secrets, key: DB_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: sufra-config, key: DB_NAME } }
            # EBS volumes mount with a lost+found dir, so initdb needs a
            # subdirectory of the mount point as its data directory.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sufra
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
