# All six NestJS microservices. Image names (sufra/<svc>) are rewritten to the
# ECR registry + tag by kustomize (see kustomization.yaml `images:`), which the
# CI GitOps step bumps on every release.
# Ports: gateway 3000 · order 3001 · restaurant 3003 · auth 3004 · manager 3006 · notif 3007
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, namespace: sufra, labels: { app: api-gateway } }
spec:
  replicas: 2
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      containers:
        - name: api-gateway
          image: sufra/api-gateway:latest
          ports: [{ containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: sufra-config }
            - secretRef: { name: sufra-secrets }
          readinessProbe: { tcpSocket: { port: 3000 }, initialDelaySeconds: 10, periodSeconds: 10 }
          livenessProbe:  { tcpSocket: { port: 3000 }, initialDelaySeconds: 30, periodSeconds: 20 }
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: sufra }
spec:
  selector: { app: api-gateway }
  ports: [{ port: 3000, targetPort: 3000 }]
  
