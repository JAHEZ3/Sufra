# Public entrypoint → api-gateway (HTTP + Socket.IO). Uses the AWS Load Balancer
# Controller (ALB). Set your ACM cert ARN + host, then the ALB fronts the gateway.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sufra-gateway
  namespace: sufra
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/XXXX
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  rules:
    - host: api.sufra.com   # ← change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
