# Public entrypoint (AWS Load Balancer Controller / ALB). One internet-facing ALB
# fronts every service via path routing on api.sufra.shop:
#   /api/auth        → auth-service:3004
#   /api/restaurant  → restaurant-service:3003
#   /api/order       → order-service:3001
#   /api/notification→ notification-service:3007
#   /api/manager     → manager-service:3006
#   /api/gateway + / → api-gateway:3000   (health check + Socket.IO realtime)
# Per-service ALB health-check paths live on each Service in services.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sufra-gateway
  namespace: sufra
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Point this at your ACM cert for api.sufra.shop before HTTPS will serve:
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/XXXX
spec:
  rules:
    - host: api.sufra.shop
      http:
        paths:
          # Specific service prefixes first; the catch-all "/" (gateway + Socket.IO) last.
          - path: /api/auth
            pathType: Prefix
            backend:
              service: { name: auth-service, port: { number: 3004 } }
          - path: /api/restaurant
            pathType: Prefix
            backend:
              service: { name: restaurant-service, port: { number: 3003 } }
          - path: /api/order
            pathType: Prefix
            backend:
              service: { name: order-service, port: { number: 3001 } }
          - path: /api/notification
            pathType: Prefix
            backend:
              service: { name: notification-service, port: { number: 3007 } }
          - path: /api/manager
            pathType: Prefix
            backend:
              service: { name: manager-service, port: { number: 3006 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 3000 } }
